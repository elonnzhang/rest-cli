run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  errcheck:
    check-type-assertions: true

issues:
  exclude-rules:
    # Test files: allow unused variables and unchecked errors
    - path: _test\.go
      linters:
        - errcheck
